  <text x="675" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#e4fbf3">Sync</text>
  <text x="675" y="244" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#e4fbf3">Export</text>
  <text x="675" y="274" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#e4fbf3">Share</text>
