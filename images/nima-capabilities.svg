<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Nima Editor capabilities sample</title>
  <desc id="desc">Stylized card showing write, review, sync, and export capabilities.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2233"/>
      <stop offset="100%" stop-color="#1f4b5f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f4f1e8"/>
      <stop offset="100%" stop-color="#d9efe8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="70" y="70" width="820" height="400" rx="28" fill="url(#panel)"/>
  <rect x="110" y="120" width="280" height="300" rx="18" fill="#173042"/>
  <rect x="420" y="120" width="190" height="300" rx="18" fill="#24506a"/>
  <rect x="640" y="120" width="210" height="300" rx="18" fill="#2f6c67"/>
