  <path d="M610 270 L640 270" stroke="#f2994a" stroke-width="8" stroke-linecap="round"/>
  <circle cx="405" cy="270" r="9" fill="#f2994a"/>
  <circle cx="625" cy="270" r="9" fill="#f2994a"/>
