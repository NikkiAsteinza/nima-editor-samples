  <text x="145" y="168" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#f7fbff">Write</text>
  <text x="145" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#b8d7eb">Markdown</text>
  <text x="145" y="244" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#b8d7eb">Tables</text>
  <text x="145" y="274" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#b8d7eb">Diagrams</text>
  <text x="455" y="168" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#f7fbff">Review</text>
  <text x="455" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d6eef5">Preview</text>
  <text x="455" y="244" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d6eef5">History</text>
  <text x="455" y="274" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d6eef5">Diff</text>
